const STORAGE_KEY = "mevry_os_session";
const NAV = {
  overview:     { label: "Vue d'Ensemble", icon: "overview",     roles: ["fondateur"] },
  clients:      { label: "Clients",        icon: "clients",      roles: ["fondateur","dev"], group: "gestion" },
  projets:      { label: "Projets",        icon: "projets",      roles: ["fondateur","dev"], group: "gestion" },
  taches:       { label: "Tâches",         icon: "taches",       roles: ["fondateur","dev"], group: "gestion" },
  calendrier:   { label: "Calendrier",     icon: "calendrier",   roles: ["fondateur","dev"], group: "gestion" },
  comptabilite: { label: "Comptabilité",   icon: "comptabilite", roles: ["fondateur"], group: "finance" },
};
let session = null;
let currentKey = null;

function loginAttempt(username, password) {
  const acc = ACCOUNTS.find(a => a.username.toLowerCase() === username.trim().toLowerCase() && a.password === password);
  if (!acc) return null;
  const s = { username: acc.username, role: acc.role, name: acc.name, displayMail: acc.displayMail, initials: acc.initials };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  return s;
}
function getSession() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch (e) { return null; } }
function logout() {
  localStorage.removeItem(STORAGE_KEY);
  session = null;
  if (calcomPollTimer) { clearInterval(calcomPollTimer); calcomPollTimer = null; }
  document.getElementById("app-shell").classList.add("hidden");
  document.getElementById("login-screen").classList.remove("hidden");
  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
}
function homeFor(role) { return role === "dev" ? "clients" : "overview"; }
let calcomPollTimer = null;
function mountApp() {
  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("app-shell").classList.remove("hidden");
  goTo(homeFor(session.role));
  syncCalcom(true); // sync silencieuse à chaque login, URL par défaut déjà en place
  if (calcomPollTimer) clearInterval(calcomPollTimer);
  calcomPollTimer = setInterval(() => {
    syncCalcom(true);
  }, 45000); // auto-sync toutes les 45s, aucun clic requis
}
function goTo(key) {
  const nav = NAV[key];
  if (!nav || !nav.roles.includes(session.role)) key = homeFor(session.role);
  currentKey = key;
  renderSidebar(key);
  document.getElementById("main").innerHTML = "";
  PAGES[key]();
  enhanceSelects(document.getElementById("main"));
  enhanceDates(document.getElementById("main"));
}

function renderSidebar(activeKey) {
  const role = session.role;
  const link = key => {
    const n = NAV[key];
    if (!n.roles.includes(role)) return "";
    return `<button class="side-link${key === activeKey ? " active" : ""}" data-nav="${key}">${ICONS[n.icon]}<span>${n.label}</span></button>`;
  };
  const gestion = ["clients","projets","taches","calendrier"].map(link).join("");
  const finance = ["comptabilite"].map(link).join("");
  const el = document.getElementById("sidebar");
  el.innerHTML = `
    <div class="side-logo">
      <div class="logo-mark"><img src="${LOGO_SRC}" alt="Mevry"></div>
      <div class="logo-text">Mevry</div>
      <span class="logo-badge">APP</span>
    </div>
    <nav class="side-nav">
      ${link("overview")}
      ${gestion ? `<div class="side-section">Gestion Clients & Projets</div>${gestion}` : ""}
      ${finance ? `<div class="side-section">Finance & Administratif</div>${finance}` : ""}
    </nav>
    <div class="side-spacer"></div>
    <div class="side-user">
      <div class="avatar">${session.role === "fondateur" ? `<img src="${PROFILE_SRC}" alt="">` : esc(session.initials)}</div>
      <div class="u-meta">
        <div class="u-name">${esc(session.name)}<span class="side-role-badge">${role === "fondateur" ? "Fondateur" : "Dev"}</span></div>
        <div class="u-mail">${esc(session.displayMail)}</div>
      </div>
      <button class="u-btn" id="logout-btn" title="Se déconnecter">${ICONS.logout}</button>
    </div>`;
  document.getElementById("logout-btn").addEventListener("click", logout);
  el.querySelectorAll("[data-nav]").forEach(btn => btn.addEventListener("click", () => goTo(btn.dataset.nav)));
}

function renderTopbar({ title, subtitle, right = "" }) {
  return `<header class="topbar">
    <div class="topbar-title"><h1>${title}</h1><p>${subtitle}</p></div>
    <div class="topbar-actions">${right}</div>
  </header>`;
}

/* =============================================================
   PAGE — VUE D'ENSEMBLE (KPIs calculés depuis la vraie donnée)
   ============================================================= */
function renderOverview() {
  const main = document.getElementById("main");
  const compta = computeCompta();
  const activeClients = DB.clients.filter(c => c.status === "actif").length;
  const prospects = DB.clients.filter(c => c.status === "prospect").length;
  const activeProjects = DB.projects.filter(p => p.stage !== "livre");
  const openTasks = DB.tasks.filter(t => t.status !== "done").length;

  const monthSeries = compta.realizedSeries.filter(v => v != null);

  function statCard(icon, label, value, sub, spark) {
    return `<div class="stat-card">
      <div class="stat-top"><span class="stat-label">${label}</span><span class="stat-icon">${ICONS[icon]}</span></div>
      <div class="stat-bottom">
        <div><div class="stat-value">${value}</div><div class="stat-sub">${sub}</div></div>
        ${spark ? `<div class="stat-viz">${spark}</div>` : ""}
      </div>
    </div>`;
  }

  main.innerHTML =
    renderTopbar({
      title: `Bonjour ${esc(session.name)} 👋`,
      subtitle: "Voici ce qui se passe sur ton agence aujourd'hui",
    }) +
    `<div class="stat-grid">
      ${statCard("revenue", `CA encaissé (${TODAY.getFullYear()})`, fmtEur(compta.totalPaid), `sur <span class="pos">${compta.nbProjets}</span> projet(s)`, sparkline(monthSeries))}
      ${statCard("profit", "Bénéfices nets", fmtEur(compta.profit), `après ${fmtEur(compta.chargesTotales)} de charges`, "")}
      ${statCard("clients", "Clients actifs", activeClients, `${prospects} prospect(s) en cours`, "")}
      ${statCard("trend", "Projets en cours", activeProjects.length, `${openTasks} tâche(s) ouvertes`, "")}
    </div>

    <div class="grid-cols-1-2" style="margin-top:16px;">
      <div class="card">
        <div class="card-head">
          <div><h3>Chiffre d'affaires</h3><div class="sub">Encaissé par mois — un nouveau projet compte direct</div></div>
          <div class="chart-legend">
            <span class="li"><span class="sw" style="background:#5247fb"></span>Encaissé</span>
          </div>
        </div>
        <div class="card-pad"><div class="chart-box" id="ov-chart"></div></div>
      </div>
      <div class="card">
        <div class="card-head">
          <div><h3>Projets en cours</h3><div class="sub">${activeProjects.length} projet(s) actifs</div></div>
          <button class="btn btn-ghost btn-sm" onclick="goTo('projets')">Voir tout</button>
        </div>
        <div class="card-pad" style="padding-top:14px;">
          ${activeProjects.sort((a,b) => parseDate(a.deadline) - parseDate(b.deadline)).slice(0, 5).map(p => {
            const c = getClient(p.clientId); const st = stageMeta(p.stage);
            return `<div class="mini-proj">
              <div><div class="mp-title">${esc(p.name)}</div><div class="mp-sub">${esc(c ? c.name : "—")}</div></div>
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="pill"><span class="dot" style="background:${st.color}"></span>${st.label}</span>
                <span class="kb-deadline${isLate(p.deadline) ? " late" : ""}">${fmtDateShort(p.deadline)}</span>
              </div>
            </div>`;
          }).join("") || `<div class="empty">${ICONS.projets}<h4>Aucun projet actif</h4><p>Tout est livré 🎉</p></div>`}
        </div>
      </div>
    </div>`;

  drawOverviewChart();
  window.addEventListener("resize", drawOverviewChart);
  function drawOverviewChart() {
    if (currentKey !== "overview") return;
    const c = computeCompta();
    lineChart("#ov-chart", { labels: MONTHS_SHORT, series: [
      { data: c.realizedSeries, color: "#5247fb" },
    ]});
  }
}

/* =============================================================
   PAGE — CLIENTS (+ sources réseaux + Cal.com)
   ============================================================= */
function renderClients() {
  const main = document.getElementById("main");
  let search = "", statusFilter = "all", sortKey = "name", sortDir = 1;

  function clientTotal(c) { return projectsOfClient(c.id).reduce((s, pr) => s + (pr.price || 0), 0); }
  function filtered() {
    let list = DB.clients.slice();
    if (statusFilter !== "all") list = list.filter(c => c.status === statusFilter);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(c => c.name.toLowerCase().includes(q) || c.contact.toLowerCase().includes(q) || c.type.toLowerCase().includes(q));
    }
    list.sort((a, b) => {
      let va, vb;
      if (sortKey === "total") { va = clientTotal(a); vb = clientTotal(b); }
      else if (sortKey === "projets") { va = projectsOfClient(a.id).length; vb = projectsOfClient(b.id).length; }
      else { va = (a[sortKey] || "").toString().toLowerCase(); vb = (b[sortKey] || "").toString().toLowerCase(); }
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
    return list;
  }
  function th(key, label) {
    const sorted = sortKey === key ? " sorted" : "";
    return `<th data-sort="${key}" class="${sorted}"><span class="th-inner">${label}<span class="sort-ind">${sortKey === key && sortDir === -1 ? "▼" : "▲"}</span></span></th>`;
  }

  function sourceBreakdown() {
    const counts = {};
    DB.clients.forEach(c => { counts[c.source] = (counts[c.source] || 0) + 1; });
    const total = DB.clients.length || 1;
    const segs = SOURCES.filter(s => counts[s.key]).map(s =>
      `<div class="seg" style="width:${(counts[s.key] / total * 100).toFixed(1)}%;background:${s.color}" title="${s.label} — ${counts[s.key]}"></div>`).join("");
    const legend = SOURCES.filter(s => counts[s.key]).map(s =>
      `<span class="item"><span class="sw" style="background:${s.color}"></span>${s.label}<span class="n">${counts[s.key]}</span></span>`).join("");
    return `<div class="card card-pad" style="margin-bottom:16px;padding:16px 20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 style="margin:0;font-size:13px;font-weight:510;">Acquisition — d'où viennent tes clients</h3>
        <span class="count-label">${DB.clients.length} client(s)</span>
      </div>
      <div class="src-bar">${segs}</div>
      <div class="src-legend">${legend}</div>
    </div>`;
  }

  function renderTable() {
    const list = filtered();
    document.getElementById("clients-table").innerHTML = `
      <table class="data">
        <thead><tr>${th("name","Client")}${th("status","Statut")}<th class="no-sort">Source</th>${th("contact","Contact")}${th("total","CA")}${th("projets","Projets")}</tr></thead>
        <tbody>${list.map(c => `
          <tr class="clickable" data-id="${c.id}">
            <td><div class="avatar-cell"><div class="avatar-sm">${esc(c.initials)}</div>
              <div><div class="cell-strong">${esc(c.name)}</div><div class="cell-muted" style="font-size:11.5px">${esc(c.type)}</div></div></div></td>
            <td>${clientStatusPill(c.status)}</td>
            <td>${sourcePill(c.source)}</td>
            <td><div>${esc(c.contact)}</div><div class="cell-muted cell-mono" style="font-size:11px">${esc(c.email)}</div></td>
            <td class="cell-mono cell-strong">${fmtEur(clientTotal(c))}</td>
            <td class="cell-mono">${projectsOfClient(c.id).length}</td>
          </tr>`).join("") || `<tr><td colspan="6"><div class="empty">${ICONS.clients}<h4>Aucun client</h4><p>Ajuste ta recherche ou tes filtres.</p></div></td></tr>`}
        </tbody>
      </table>`;
    document.querySelectorAll("#clients-table th[data-sort]").forEach(el => el.addEventListener("click", () => {
      const k = el.dataset.sort;
      if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = 1; }
      renderTable();
    }));
    document.querySelectorAll("#clients-table tr.clickable").forEach(tr => tr.addEventListener("click", () => openClientDrawer(tr.dataset.id)));
    const cl = document.getElementById("count"); if (cl) cl.textContent = `${list.length} résultat(s)`;
  }

  function openClientDrawer(id) {
    const c = getClient(id);
    const projects = projectsOfClient(id);
    const total = projects.reduce((s, pr) => s + (pr.price || 0), 0);
    const paid = projects.filter(pr => pr.stage === "livre").reduce((s, pr) => s + (pr.price || 0), 0);
    const timeline = [{ date: c.since, text: `Client ajouté via ${sourceMeta(c.source).label}` }];
    projects.forEach(pr => timeline.push({ date: pr.deadline, text: (pr.stage === "livre" ? "Projet livré : " : "Échéance : ") + pr.name + (pr.price ? ` — ${fmtEur(pr.price)}` : "") }));
    timeline.sort((a, b) => parseDate(b.date) - parseDate(a.date));

    openDrawer(`
      <div class="drawer-head">
        <div style="display:flex;align-items:center;gap:11px;">
          <div class="avatar-sm" style="width:38px;height:38px;border-radius:9px;font-size:13px;">${esc(c.initials)}</div>
          <div><div class="d-title">${esc(c.name)}</div><div class="d-sub">${esc(c.type)}</div></div>
        </div>
        <button class="drawer-close" onclick="closeDrawer()">${ICONS.close}</button>
      </div>
      <div class="field" style="margin-top:-4px;">
        <label>Statut</label>
        <select class="input" id="cl-status">
          <option value="prospect" ${c.status === "prospect" ? "selected" : ""}>Prospect</option>
          <option value="actif" ${c.status === "actif" ? "selected" : ""}>Actif</option>
          <option value="terminé" ${c.status === "terminé" ? "selected" : ""}>Terminé</option>
        </select>
      </div>
      <div style="display:flex;gap:7px;margin-top:-6px;">${sourcePill(c.source)}</div>
      <div class="stat-mini-grid">
        <div class="stat-mini"><div class="m-label">CA total</div><div class="m-value">${fmtEur(total)}</div></div>
        <div class="stat-mini"><div class="m-label">Encaissé</div><div class="m-value">${fmtEur(paid)}</div></div>
      </div>
      <div>
        <div class="drawer-section-title">Coordonnées</div>
        <div class="info-line"><span class="il-key">Contact</span><span class="il-val">${esc(c.contact)}</span></div>
        <div class="info-line"><span class="il-key">Email</span><span class="il-val cell-mono" style="font-size:11.5px">${esc(c.email)}</span></div>
        <div class="info-line"><span class="il-key">Téléphone</span><span class="il-val cell-mono" style="font-size:11.5px">${esc(c.phone || "—")}</span></div>
        <div class="info-line"><span class="il-key">Client depuis</span><span class="il-val">${fmtDate(c.since)}</span></div>
      </div>
      <div>
        <div class="drawer-section-title">Projets liés (${projects.length})</div>
        ${projects.map(p => {
          const st = stageMeta(p.stage);
          return `<div class="mini-proj"><div><div class="mp-title">${esc(p.name)}</div><div class="mp-sub">Échéance ${fmtDateShort(p.deadline)}</div></div>
            <span class="pill"><span class="dot" style="background:${st.color}"></span>${st.label}</span></div>`;
        }).join("") || `<div class="cell-muted" style="font-size:12px">Aucun projet.</div>`}
      </div>
      <div>
        <div class="drawer-section-title">Historique</div>
        <div class="timeline">${timeline.map(t => `<div class="tl-item"><div class="tl-dot"></div><div><div class="tl-text">${esc(t.text)}</div><div class="tl-date">${fmtDate(t.date)}</div></div></div>`).join("")}</div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:2px;">
        <div class="drawer-section-title">Zone de danger</div>
        <div class="cell-muted" style="font-size:11.5px;margin-bottom:10px;">Supprime le client${projects.length ? ` et ses ${projects.length} projet(s) liés` : ""}. Les événements liés seront aussi retirés. Action irréversible.</div>
        <button class="btn btn-ghost btn-danger" id="cl-delete" style="width:100%;justify-content:center;">${ICONS.trash}Supprimer le client</button>
      </div>`);
    document.getElementById("cl-status").addEventListener("change", e => {
      c.status = e.target.value;
      saveDB();
      toast(`Statut mis à jour — ${c.name}`);
      renderClients();
    });
    let confirmDel = false;
    const delBtn = document.getElementById("cl-delete");
    delBtn.addEventListener("click", () => {
      if (!confirmDel) {
        confirmDel = true;
        delBtn.innerHTML = `${ICONS.trash}Confirmer la suppression ?`;
        delBtn.style.background = "rgba(220,38,38,0.06)";
        delBtn.style.color = "var(--crimson)";
        return;
      }
      const projIds = projectsOfClient(id).map(p => p.id);
      DB.projects = DB.projects.filter(p => p.clientId !== id);
      DB.tasks = DB.tasks.map(t => projIds.includes(t.projectId) ? { ...t, projectId: null } : t);
      const removedEvents = DB.events.filter(e => e.clientId === id || projIds.includes(e.projectId));
      removedEvents.forEach(e => { if (e.calUid && !DB.dismissedCalUids.includes(e.calUid)) DB.dismissedCalUids.push(e.calUid); });
      DB.events = DB.events.filter(e => e.clientId !== id && !projIds.includes(e.projectId));
      DB.charges = DB.charges.filter(ch => !projIds.includes(ch.projectId));
      DB.clients = DB.clients.filter(c => c.id !== id);
      saveDB(); closeDrawer(); toast("Client supprimé"); renderClients();
    });
  }

  /* ----- Modal Nouveau client (avec source réseau) ----- */
  function openNewClientModal(prefill = {}) {
    const isCal = prefill.source === "calcom";
    openModal(`
      <div class="modal-head"><h3>${isCal ? "Nouveau booking Cal.com" : "Nouveau client"}</h3><button class="drawer-close" onclick="closeModal()">${ICONS.close}</button></div>
      ${isCal ? `<p style="font-size:12px;color:var(--text-2);margin:-8px 0 16px;">Nouveau call Cal.com : la fiche client est créée à partir du prénom + nom, et le call est ajouté direct au calendrier.</p>
      <div class="field-row">
        <div class="field"><label>Prénom</label><input class="input" id="f-prenom" placeholder="Marie"></div>
        <div class="field"><label>Nom</label><input class="input" id="f-nom" placeholder="Lambert"></div>
      </div>
      <div class="field"><label>Entreprise <span style="color:var(--text-3);font-weight:400">(optionnel)</span></label><input class="input" id="f-name" placeholder="Acme Inc."></div>` : `
      <div class="field"><label>Nom de l'entreprise</label><input class="input" id="f-name" placeholder="Acme Inc."></div>
      <div class="field"><label>Contact</label><input class="input" id="f-contact" placeholder="Prénom Nom"></div>`}
      <div class="field"><label>Email</label><input class="input" id="f-email" placeholder="contact@acme.com"></div>
      <div class="field-row">
        <div class="field"><label>Type</label><input class="input" id="f-type" placeholder="SaaS, Agence…" value="${esc(prefill.type || "")}"></div>
        <div class="field"><label>Statut</label>
          <select class="input" id="f-status">
            <option value="prospect" ${isCal ? "selected" : ""}>Prospect</option>
            <option value="actif" ${!isCal ? "selected" : ""}>Actif</option>
            <option value="terminé">Terminé</option>
          </select></div>
      </div>
      <div class="field"><label>Source — il vient d'où ?</label>
        <select class="input" id="f-source">
          ${SOURCES.map(s => `<option value="${s.key}" ${prefill.source === s.key ? "selected" : ""}>${s.label}</option>`).join("")}
        </select></div>
      ${isCal ? `<div class="field"><label>Date du call</label><input class="input" type="date" id="f-caldate" value="${toISO(TODAY)}"></div>` : ""}
      <div class="form-error hidden" id="f-err">Remplis les champs obligatoires.</div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        <button class="btn" id="f-save">${isCal ? "Créer le booking" : "Créer le client"}</button>
      </div>`);
    document.getElementById("f-save").addEventListener("click", () => {
      let name, contact;
      if (isCal) {
        const prenom = document.getElementById("f-prenom").value.trim();
        const nom = document.getElementById("f-nom").value.trim();
        contact = (prenom + " " + nom).trim();
        name = document.getElementById("f-name").value.trim() || contact;
        if (!prenom || !nom) { document.getElementById("f-err").classList.remove("hidden"); return; }
      } else {
        name = document.getElementById("f-name").value.trim();
        contact = document.getElementById("f-contact").value.trim();
        if (!name || !contact) { document.getElementById("f-err").classList.remove("hidden"); return; }
      }
      const client = {
        id: uid("c"), name, contact,
        email: document.getElementById("f-email").value.trim() || "—",
        phone: "", type: document.getElementById("f-type").value.trim() || "—",
        status: document.getElementById("f-status").value,
        source: document.getElementById("f-source").value,
        since: toISO(TODAY), initials: initialsOf(name),
      };
      DB.clients.push(client);
      if (isCal) {
        const d = document.getElementById("f-caldate").value || toISO(TODAY);
        DB.events.push({ id: uid("e"), date: d, type: "call", title: `Call Cal.com — ${contact}` });
      }
      saveDB();
      closeModal();
      toast(isCal ? `Call de ${contact} ajouté au calendrier + fiche client créée` : `Client ${name} créé`);
      renderClients();
    });
  }

  main.innerHTML =
    renderTopbar({
      title: "Clients",
      subtitle: "CRM synchronisé avec la compta et le calendrier",
      right: `<button class="btn-icon" id="cal-config-btn" title="Configurer Cal.com">${ICONS.gear}</button>
              <button class="btn btn-ghost" id="cal-sync-btn">${ICONS.refresh}Sync Cal.com</button>
              <button class="btn btn-ghost" id="cal-btn">${ICONS.zap}Booking manuel</button>
              <button class="btn" id="add-btn">${ICONS.plus}Nouveau client</button>`,
    }) +
    sourceBreakdown() +
    `<div class="toolbar">
      <div class="search">${ICONS.search}<input id="search" type="text" placeholder="Rechercher…"></div>
      <select class="select" id="status-filter">
        <option value="all">Tous les statuts</option>
        <option value="prospect">Prospect</option>
        <option value="actif">Actif</option>
        <option value="terminé">Terminé</option>
      </select>
      <div class="spacer"></div><span class="count-label" id="count"></span>
    </div>
    <div class="card" id="clients-table"></div>`;

  document.getElementById("search").addEventListener("input", e => { search = e.target.value; renderTable(); });
  document.getElementById("status-filter").addEventListener("change", e => { statusFilter = e.target.value; renderTable(); });
  document.getElementById("add-btn").addEventListener("click", () => openNewClientModal());
  document.getElementById("cal-btn").addEventListener("click", () => openNewClientModal({ source: "calcom" }));

const DISCORD_EMBED_COLOR = 5721851; // #574EFB
const DISCORD_BANNER_URL = "https://cdn.discordapp.com/attachments/1013918516853866602/1034952328803012619/barre-transparent-1-1.png?ex=6a478ab7&is=6a463937&hm=c8ffe859c24dd5a167e0c22ed928fea3a407cccaeffe64db193fa375f1baadaa";
const DISCORD_DEV_ROLE_ID = "1522187964430549122";

async function notifyDiscord({ content = "", title, description, fields = [] }) {
  const embed = {
    title,
    description,
    color: DISCORD_EMBED_COLOR,
    fields,
    image: { url: DISCORD_BANNER_URL },
    footer: { text: "Mevry App" },
    timestamp: new Date().toISOString(),
  };
  try {
    await fetch("/api/discord-notify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        content,
        embeds: [embed],
        allowed_mentions: { roles: [DISCORD_DEV_ROLE_ID] },
      }),
    });
  } catch (err) { /* silencieux : pas grave si Discord est down */ }
}

function notifyProjectEnteredDev(p) {
  const c = getClient(p.clientId);
  const fields = [];
  if (c) fields.push({ name: "Client", value: c.name, inline: true });
  if (p.deadline) fields.push({ name: "Deadline", value: fmtDateShort(p.deadline), inline: true });
  if (p.figma) fields.push({ name: "Figma", value: p.figma, inline: false });
  notifyDiscord({
    content: `<@&${DISCORD_DEV_ROLE_ID}>`,
    title: `Projet - ${p.name}`,
    description: "Nouveau projet prêt pour l'intégration Webflow — tu peux commencer avec les instructions sur le Figma.",
    fields,
  });
}

function renderProjets() {
  const main = document.getElementById("main");
  let clientFilter = "all";

  function filtered() { return clientFilter === "all" ? DB.projects.slice() : DB.projects.filter(p => p.clientId === clientFilter); }

  function card(p) {
    const c = getClient(p.clientId);
    const late = isLate(p.deadline) && p.stage !== "livre";
    const links = [];
    if (p.figma) links.push(`<a href="${esc(p.figma)}" target="_blank" title="Figma" onclick="event.stopPropagation()">${ICONS.figma}</a>`);
    if (p.repo) links.push(`<a href="${esc(p.repo)}" target="_blank" title="Repo" onclick="event.stopPropagation()">${ICONS.repo}</a>`);
    return `<div class="kb-card" draggable="true" data-id="${p.id}">
      <div class="kb-id">${esc(p.id.toUpperCase().replace("_", "-"))}</div>
      <div class="kb-title">${esc(p.name)}</div>
      <div class="kb-client">${esc(c ? c.name : "—")}${p.price ? ` · <span style="font-family:var(--font-mono);color:var(--text)">${fmtEur(p.price)}</span>` : ""}</div>
      <div class="kb-meta">
        <span class="kb-deadline${late ? " late" : ""}">${ICONS.calSm}${fmtDateShort(p.deadline)}</span>
        <span class="kb-links">${links.join("")}</span>
      </div>
    </div>`;
  }

  function renderBoard() {
    const list = filtered();
    document.getElementById("board").innerHTML = `<div class="kanban">${STAGES.map(st => {
      const items = list.filter(p => p.stage === st.key);
      return `<div class="kb-col" data-stage="${st.key}">
        <div class="kb-col-head">
          <div class="kb-col-title"><span class="stage-dot" style="background:${st.color}"></span>${st.label}</div>
          <span class="kb-count">${items.length}</span>
        </div>
        <div class="kb-cards">${items.map(card).join("")}</div>
      </div>`;
    }).join("")}</div>`;

    // Drag & drop
    document.querySelectorAll(".kb-card").forEach(el => {
      el.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/plain", el.dataset.id);
        e.dataTransfer.effectAllowed = "move";
        el.classList.add("dragging");
      });
      el.addEventListener("dragend", () => el.classList.remove("dragging"));
      el.addEventListener("click", () => openProjectDrawer(el.dataset.id));
    });
    document.querySelectorAll(".kb-col").forEach(col => {
      col.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; col.classList.add("drag-over"); });
      col.addEventListener("dragleave", e => { if (!col.contains(e.relatedTarget)) col.classList.remove("drag-over"); });
      col.addEventListener("drop", e => {
        e.preventDefault();
        col.classList.remove("drag-over");
        const id = e.dataTransfer.getData("text/plain");
        const p = getProject(id);
        const newStage = col.dataset.stage;
        if (p && p.stage !== newStage) {
          p.stage = newStage;
          saveDB();
          toast(newStage === "livre" ? `« ${p.name} » livré 🎉` : `« ${p.name} » → ${stageMeta(newStage).label}`);
          if (newStage === "dev") notifyProjectEnteredDev(p);
          renderBoard();
        }
      });
    });
    const cl = document.getElementById("count"); if (cl) cl.textContent = `${list.length} projet(s)`;
  }

  function openProjectDrawer(id) {
    const p = getProject(id);
    const c = getClient(p.clientId);
    const st = stageMeta(p.stage);
    openDrawer(`
      <div class="drawer-head">
        <div><div class="d-title">${esc(p.name)}</div><div class="d-sub">${esc(c ? c.name : "—")}${c ? " · " + esc(c.type) : ""}</div></div>
        <button class="drawer-close" onclick="closeDrawer()">${ICONS.close}</button>
      </div>
      <div style="display:flex;gap:7px;margin-top:-4px;">
        <span class="pill"><span class="dot" style="background:${st.color}"></span>${st.label}</span>
        ${isLate(p.deadline) && p.stage !== "livre" ? `<span class="pill"><span class="dot dot-crimson"></span>En retard</span>` : ""}
      </div>
      <div>
        <div class="drawer-section-title">Détails</div>
        <div class="info-line"><span class="il-key">Étape</span><span class="il-val">
          <select class="input" id="d-stage" style="width:130px;padding:5px 26px 5px 9px;font-size:12px;">
            ${STAGES.map(s => `<option value="${s.key}" ${s.key === p.stage ? "selected" : ""}>${s.label}</option>`).join("")}
          </select></span></div>
        <div class="info-line"><span class="il-key">Échéance</span><span class="il-val">
          <input class="input" type="date" id="d-deadline" value="${p.deadline}" style="width:150px;padding:5px 9px;font-size:12px;"></span></div>
        <div class="info-line"><span class="il-key">Montant (€)</span><span class="il-val">
          <input class="input" type="number" id="d-price" value="${p.price || 0}" min="0" style="width:110px;padding:5px 9px;font-size:12px;"></span></div>
      </div>
      <div>
        <div class="drawer-section-title">Liens du projet</div>
        <div class="field"><label>Figma</label><input class="input" id="d-figma" placeholder="https://figma.com/…" value="${esc(p.figma || "")}"></div>
        <div class="field"><label>Repo</label><input class="input" id="d-repo" placeholder="https://github.com/…" value="${esc(p.repo || "")}"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn" id="d-save">Enregistrer</button>
        <button class="btn btn-ghost btn-danger" id="d-delete">${ICONS.trash}Supprimer</button>
      </div>`);
    document.getElementById("d-save").addEventListener("click", () => {

      p.stage = document.getElementById("d-stage").value;
      if (p.stage === "dev" && prevStage !== "dev") notifyProjectEnteredDev(p);
      p.deadline = document.getElementById("d-deadline").value || p.deadline;
      p.price = parseFloat(document.getElementById("d-price").value) || 0;
      p.figma = document.getElementById("d-figma").value.trim();
      p.repo = document.getElementById("d-repo").value.trim();
      // Synchro de l'échéance avec le calendrier
      const ev = DB.events.find(e => e.projectId === p.id && e.type === "deadline");
      if (ev) { ev.date = p.deadline; ev.title = `Livraison ${p.name}`; }
      else DB.events.push({ id: uid("e"), date: p.deadline, type: "deadline", title: `Livraison ${p.name}`, projectId: p.id });
      saveDB(); closeDrawer(); toast("Projet mis à jour — calendrier synchro"); renderBoard();
    });
    document.getElementById("d-delete").addEventListener("click", () => {
      DB.projects = DB.projects.filter(x => x.id !== id);
      DB.tasks = DB.tasks.map(t => t.projectId === id ? { ...t, projectId: null } : t);
      DB.events = DB.events.filter(e => e.projectId !== id);
      saveDB(); closeDrawer(); toast("Projet supprimé"); renderBoard();
    });
  }

  function openNewProjectModal() {
    if (DB.clients.length === 0) { toast("Ajoute d'abord un client pour créer un projet"); return; }
    openModal(`
      <div class="modal-head"><h3>Nouveau projet</h3><button class="drawer-close" onclick="closeModal()">${ICONS.close}</button></div>
      <div class="field"><label>Nom du projet</label><input class="input" id="f-name" placeholder="Landing Acme"></div>
      <div class="field-row">
        <div class="field"><label>Client</label>
          <select class="input" id="f-client">${DB.clients.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join("")}</select></div>
        <div class="field"><label>Échéance</label><input class="input" type="date" id="f-deadline" value="${toISO(addDays(TODAY, 14))}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Montant du projet (€)</label><input class="input" type="number" id="f-price" placeholder="2500" min="0"></div>
        <div class="field"><label>Coût presta (€) <span style="color:var(--text-3);font-weight:400">(optionnel)</span></label><input class="input" type="number" id="f-cost" placeholder="800" min="0"></div>
      </div>
      <div class="field"><label>Lien Figma <span style="color:var(--text-3);font-weight:400">(optionnel)</span></label><input class="input" id="f-figma" placeholder="https://figma.com/…"></div>
      <div class="field"><label>Lien repo <span style="color:var(--text-3);font-weight:400">(optionnel)</span></label><input class="input" id="f-repo" placeholder="https://github.com/…"></div>
      <div class="form-error hidden" id="f-err">Le nom du projet est requis.</div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        <button class="btn" id="f-save">Créer le projet</button>
      </div>`);
    document.getElementById("f-save").addEventListener("click", () => {
      const name = document.getElementById("f-name").value.trim();
      if (!name) { document.getElementById("f-err").classList.remove("hidden"); return; }
      const pid = uid("p");
      const deadline = document.getElementById("f-deadline").value || toISO(TODAY);
      DB.projects.push({
        id: pid, name,
        clientId: document.getElementById("f-client").value,
        stage: "figma",

        figma: document.getElementById("f-figma").value.trim(),
        repo: document.getElementById("f-repo").value.trim(),

      DB.events.push({ id: uid("e"), date: deadline, type: "deadline", title: `Livraison ${name}`, projectId: pid });

      const cost = parseFloat(document.getElementById("f-cost").value) || 0;

  main.innerHTML =
    renderTopbar({
      title: "Projets",
      subtitle: "Glisse les cartes pour changer d'étape — de Figma à la livraison",
      right: `<button class="btn-icon" id="discord-config-btn" title="Connecter Discord">${ICONS.gear}</button>
              <button class="btn" id="add-btn">${ICONS.plus}Nouveau projet</button>`,
    }) +
    `<div class="toolbar">
      <select class="select" id="client-filter">
        <option value="all">Tous les clients</option>
        ${DB.clients.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join("")}
      </select>
      <div class="spacer"></div><span class="count-label" id="count"></span>

  document.getElementById("client-filter").addEventListener("change", e => { clientFilter = e.target.value; renderBoard(); });

  document.getElementById("discord-config-btn").addEventListener("click", openDiscordConfig);

/* =============================================================
   PAGE — TÂCHES (ajout, cocher, supprimer, filtres)
   ============================================================= */
function renderTaches() {
  const main = document.getElementById("main");
  let projectFilter = "all", statusFilter = "all";

  function filtered() {
    let list = DB.tasks.slice();
    if (projectFilter === "perso") list = list.filter(t => !t.projectId);
    else if (projectFilter !== "all") list = list.filter(t => t.projectId === projectFilter);
    if (statusFilter !== "all") list = list.filter(t => statusFilter === "done" ? t.status === "done" : t.status !== "done");
    list.sort((a, b) => {
      if ((a.status === "done") !== (b.status === "done")) return a.status === "done" ? 1 : -1;
      return (a.order ?? 0) - (b.order ?? 0);
    });
    return list;
  }

  function renderList() {
    const list = filtered();
    document.getElementById("task-list").innerHTML = list.length ? list.map(t => {
      const proj = t.projectId ? getProject(t.projectId) : null;
      const client = proj ? getClient(proj.clientId) : null;
      const done = t.status === "done";
      const late = !done && isLate(t.deadline);
      return `<div class="task-row${done ? " done" : ""}" data-id="${t.id}" draggable="true">
        <span class="task-drag" title="Glisser pour réordonner">${ICONS.dragHandle || "⠿"}</span>
        <div class="task-check">${ICONS.check}</div>
        <div class="task-main">
          <div class="task-title" data-edit="1" title="Cliquer pour modifier">${esc(t.label)}</div>
          <div class="task-sub">${proj ? `<span class="proj">${esc(proj.name)}</span>${client ? " · " + esc(client.name) : ""}` : "Perso"}</div>
        </div>
        <div class="task-meta">
          ${priorityPill(t.priority)}
          <span class="task-deadline${late ? " late" : ""}">${ICONS.calSm}${fmtDateShort(t.deadline)}</span>
          <button class="task-del" title="Supprimer">${ICONS.trash}</button>
        </div>
      </div>`;
    }).join("") : `<div class="empty">${ICONS.taches}<h4>Aucune tâche</h4><p>Tout est fait, ou ajuste tes filtres.</p></div>`;

    document.querySelectorAll(".task-row").forEach(row => {
      const t = DB.tasks.find(x => x.id === row.dataset.id);
      row.querySelector(".task-check").addEventListener("click", () => {
        t.status = t.status === "done" ? "todo" : "done";
        saveDB(); toast(t.status === "done" ? "Tâche terminée 🎉" : "Tâche réouverte"); renderList();
      });
      row.querySelector(".task-del").addEventListener("click", () => {
        DB.tasks = DB.tasks.filter(x => x.id !== t.id);
        saveDB(); toast("Tâche supprimée"); renderList();
      });
      row.querySelector('[data-edit]').addEventListener("click", () => openEditTaskModal(t.id));

      // Réorganisation par glisser-déposer
      row.addEventListener("dragstart", () => row.classList.add("dragging"));
      row.addEventListener("dragend", () => row.classList.remove("dragging"));
      row.addEventListener("dragover", e => {
        e.preventDefault();
        const dragging = document.querySelector(".task-row.dragging");
        if (!dragging || dragging === row) return;
        const rect = row.getBoundingClientRect();
        const before = (e.clientY - rect.top) < rect.height / 2;
        row.parentNode.insertBefore(dragging, before ? row : row.nextSibling);
      });
      row.addEventListener("drop", () => {
        const ids = [...document.querySelectorAll(".task-row")].map(r => r.dataset.id);
        ids.forEach((id, i) => { const tk = DB.tasks.find(x => x.id === id); if (tk) tk.order = i; });
        saveDB();
        toast("Ordre mis à jour");
      });
    });
    const cl = document.getElementById("count"); if (cl) cl.textContent = `${list.length} tâche(s)`;
  }

  function openNewTaskModal() {
    openModal(`
      <div class="modal-head"><h3>Nouvelle tâche</h3><button class="drawer-close" onclick="closeModal()">${ICONS.close}</button></div>
      <div class="field"><label>Titre</label><input class="input" id="f-label" placeholder="Intégrer le hero…"></div>
      <div class="field-row">
        <div class="field"><label>Projet</label>
          <select class="input" id="f-project">
            <option value="">Perso (aucun projet)</option>
            ${DB.projects.filter(p => p.stage !== "livre").map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join("")}
          </select></div>
        <div class="field"><label>Priorité</label>
          <select class="input" id="f-priority">
            <option value="haute">Haute</option>
            <option value="moyenne" selected>Moyenne</option>
            <option value="basse">Basse</option>
          </select></div>
      </div>
      <div class="field"><label>Deadline</label><input class="input" type="date" id="f-deadline" value="${toISO(addDays(TODAY, 7))}"></div>
      <div class="form-error hidden" id="f-err">Le titre est requis.</div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        <button class="btn" id="f-save">Ajouter la tâche</button>
      </div>`);
    document.getElementById("f-save").addEventListener("click", () => {
      const label = document.getElementById("f-label").value.trim();
      if (!label) { document.getElementById("f-err").classList.remove("hidden"); return; }
      const maxOrder = DB.tasks.reduce((m, t) => Math.max(m, t.order ?? 0), 0);
      DB.tasks.push({
        id: uid("t"), label,
        projectId: document.getElementById("f-project").value || null,
        priority: document.getElementById("f-priority").value,
        status: "todo",
        deadline: document.getElementById("f-deadline").value || toISO(TODAY),
        order: maxOrder + 1,
      });
      saveDB(); closeModal(); toast("Tâche ajoutée"); renderList();
    });
  }

  main.innerHTML =
    renderTopbar({
      title: "Tâches",
      subtitle: "Ta to-do, projets et perso confondus — glisse pour réordonner",
      right: `<button class="btn" id="add-btn">${ICONS.plus}Nouvelle tâche</button>`,
    }) +
    `<div class="toolbar">
      <select class="select" id="project-filter">
        <option value="all">Toutes les tâches</option>
        <option value="perso">Perso uniquement</option>
        ${DB.projects.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join("")}
      </select>
      <select class="select" id="status-filter">
        <option value="all">Tous les statuts</option>
        <option value="open">À faire</option>
        <option value="done">Fait</option>
      </select>
      <div class="spacer"></div><span class="count-label" id="count"></span>
    </div>
    <div class="card"><div class="task-list" id="task-list"></div></div>`;

  document.getElementById("project-filter").addEventListener("change", e => { projectFilter = e.target.value; renderList(); });
  document.getElementById("status-filter").addEventListener("change", e => { statusFilter = e.target.value; renderList(); });
  document.getElementById("add-btn").addEventListener("click", openNewTaskModal);
  renderList();
}

/* Modal d'édition complète d'une tâche — titre, projet, priorité, statut, date */

  if (!t) return;
  openModal(`
    <div class="modal-head"><h3>Modifier la tâche</h3><button class="drawer-close" onclick="closeModal()">${ICONS.close}</button></div>
    <div class="field"><label>Titre</label><input class="input" id="tm-label" value="${esc(t.label)}"></div>

      <div class="field"><label>Projet</label>
        <select class="input" id="tm-project">

          ${DB.projects.map(p => `<option value="${p.id}" ${t.projectId === p.id ? "selected" : ""}>${esc(p.name)}</option>`).join("")}
        </select></div>
      <div class="field"><label>Priorité</label>
        <select class="input" id="tm-priority">
          <option value="haute" ${t.priority === "haute" ? "selected" : ""}>Haute</option>
          <option value="moyenne" ${t.priority === "moyenne" ? "selected" : ""}>Moyenne</option>
          <option value="basse" ${t.priority === "basse" ? "selected" : ""}>Basse</option>

    </div>
    <div class="field-row">

        <select class="input" id="tm-status">
          <option value="todo" ${t.status !== "done" ? "selected" : ""}>À faire</option>
          <option value="done" ${t.status === "done" ? "selected" : ""}>Terminée</option>
        </select></div>
      <div class="field"><label>Deadline</label><input class="input" type="date" id="tm-deadline" value="${t.deadline}"></div>
    </div>
    <div class="form-error hidden" id="tm-err">Le titre est requis.</div>
    <div class="modal-foot" style="justify-content:space-between;">
      <button class="btn btn-ghost btn-danger" id="tm-delete">${ICONS.trash}Supprimer</button>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        <button class="btn" id="tm-save">Enregistrer</button>
      </div>
    </div>`);
  document.getElementById("tm-save").addEventListener("click", () => {
    const label = document.getElementById("tm-label").value.trim();
    if (!label) { document.getElementById("tm-err").classList.remove("hidden"); return; }
    t.label = label;
    t.projectId = document.getElementById("tm-project").value || null;

    t.deadline = document.getElementById("tm-deadline").value || t.deadline;
    saveDB(); closeModal(); toast("Tâche mise à jour");
    if (currentKey) goTo(currentKey);
  });
  document.getElementById("tm-delete").addEventListener("click", () => {
    DB.tasks = DB.tasks.filter(x => x.id !== taskId);
    saveDB(); closeModal(); toast("Tâche supprimée");
    if (currentKey) goTo(currentKey);
  });
}

/* =============================================================
   PAGE — CALENDRIER (nouvel événement + bookings Cal.com)
   ============================================================= */
function renderCalendrier() {
  const main = document.getElementById("main");
  let viewYear = TODAY.getFullYear(), viewMonth = TODAY.getMonth();

  function evClass(type) { return type === "rdv" ? "ev-rdv" : type === "deadline" ? "ev-deadline" : type === "tache" ? "ev-tache" : "ev-call"; }

  function buildGrid() {
    const first = new Date(viewYear, viewMonth, 1);
    const firstDow = (first.getDay() + 6) % 7;
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();
    const cells = [];
    for (let i = firstDow - 1; i >= 0; i--) cells.push({ day: daysInPrev - i, other: true });
    for (let d = 1; d <= daysInMonth; d++) {
      cells.push({ day: d, other: false, today: viewYear === TODAY.getFullYear() && viewMonth === TODAY.getMonth() && d === TODAY.getDate() });
    }
    let next = 1;
    while (cells.length % 7 !== 0) cells.push({ day: next++, other: true });

    document.getElementById("cal-grid").innerHTML =
      DOW_FR.map(d => `<div class="cal-dow">${d}</div>`).join("") +
      cells.map(c => {
        const ds = c.other ? null : `${viewYear}-${String(viewMonth + 1).padStart(2, "0")}-${String(c.day).padStart(2, "0")}`;
        const evs = ds ? DB.events.filter(e => e.date === ds) : [];
        const tasksHere = ds ? DB.tasks.filter(t => t.deadline === ds && t.status !== "done") : [];
        return `<div class="cal-cell${c.other ? " other" : ""}${c.today ? " today" : ""}">
          <div class="cal-num">${c.day}</div>
          ${evs.map(e => `<div class="cal-event ${evClass(e.type)}" data-id="${e.id}" title="${esc(e.title)} — clique pour gérer">${esc(e.title)}</div>`).join("")}
          ${tasksHere.map(t => `<div class="cal-event ev-tache" data-task="${t.id}" title="Tâche : ${esc(t.label)} — clique pour gérer">✓ ${esc(t.label)}</div>`).join("")}
        </div>`;
      }).join("");
    document.getElementById("cal-month-label").textContent = `${MONTHS_FR[viewMonth]} ${viewYear}`;
  }

  function openNewEventModal() {
    openModal(`
      <div class="modal-head"><h3>Nouvel événement</h3><button class="drawer-close" onclick="closeModal()">${ICONS.close}</button></div>
      <div class="field"><label>Titre</label><input class="input" id="f-title" placeholder="Call découverte…"></div>
      <div class="field-row">
        <div class="field"><label>Date</label><input class="input" type="date" id="f-date" value="${toISO(new Date(viewYear, viewMonth, Math.min(TODAY.getDate(), 28)))}"></div>
        <div class="field"><label>Type</label>
          <select class="input" id="f-type">
            <option value="rdv">Rendez-vous</option>
            <option value="call">Call</option>
            <option value="deadline">Deadline</option>
          </select></div>
      </div>
      <div class="field"><label>Heure <span style="color:var(--text-3);font-weight:400">(optionnel)</span></label><input class="input" type="time" id="f-time"></div>
      <div class="form-error hidden" id="f-err">Le titre est requis.</div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        <button class="btn" id="f-save">Ajouter</button>
      </div>`);
    document.getElementById("f-save").addEventListener("click", () => {
      const title = document.getElementById("f-title").value.trim();
      if (!title) { document.getElementById("f-err").classList.remove("hidden"); return; }
      DB.events.push({ id: uid("e"), date: document.getElementById("f-date").value || toISO(TODAY), time: document.getElementById("f-time").value || "", type: document.getElementById("f-type").value, title });
      saveDB(); closeModal(); toast("Événement ajouté"); buildGrid();
    });
  }

  const EV_TYPE_LABEL = { rdv: "Rendez-vous", call: "Call", deadline: "Deadline" };
  function openEventModal(id) {
    const ev = DB.events.find(e => e.id === id);
    if (!ev) return;
    const linkedProject = ev.projectId ? getProject(ev.projectId) : null;
    const linkedClient = ev.clientId ? getClient(ev.clientId) : (linkedProject ? getClient(linkedProject.clientId) : null);
    openModal(`
      <div class="modal-head"><h3>Événement</h3><button class="drawer-close" onclick="closeModal()">${ICONS.close}</button></div>
      <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:16px;">
        <div class="info-line"><span class="il-key">Titre</span><span class="il-val">${esc(ev.title)}</span></div>
        <div class="info-line"><span class="il-key">Date</span><span class="il-val">${fmtDate(ev.date)}</span></div>
        <div class="info-line"><span class="il-key">Type</span><span class="il-val">${EV_TYPE_LABEL[ev.type] || esc(ev.type)}</span></div>
        ${linkedClient ? `<div class="info-line"><span class="il-key">Client</span><span class="il-val">${esc(linkedClient.name)}</span></div>` : ""}
        ${ev.calUid ? `<div class="info-line"><span class="il-key">Source</span><span class="il-val">Cal.com</span></div>` : ""}
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Fermer</button>
        <button class="btn btn-ghost btn-danger" id="ev-del">${ICONS.trash}Supprimer</button>
      </div>`);
    document.getElementById("ev-del").addEventListener("click", () => {
      if (ev.calUid && !DB.dismissedCalUids.includes(ev.calUid)) DB.dismissedCalUids.push(ev.calUid);
      DB.events = DB.events.filter(e => e.id !== id);
      saveDB(); closeModal(); toast("Événement supprimé"); buildGrid();
    });
  }

  main.innerHTML =
    renderTopbar({
      title: "Calendrier",
      subtitle: "Rendez-vous, deadlines et calls — les bookings Cal.com arrivent ici automatiquement",
      right: `<button class="btn btn-ghost" id="cal-sync-btn">${ICONS.refresh}Sync Cal.com</button>
              <button class="btn" id="add-btn">${ICONS.plus}Nouvel événement</button>`,
    }) +
    `<div class="card card-pad">
      <div class="cal-head">
        <div class="cal-nav">
          <button class="btn-icon" id="prev-month">${ICONS.chevronL}</button>
          <button class="btn-icon" id="next-month">${ICONS.chevronR}</button>
        </div>
        <div class="cal-month" id="cal-month-label"></div>
        <div style="flex:1"></div>
        <button class="btn btn-ghost btn-sm" id="today-btn">Aujourd'hui</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-legend">
        <span class="legend-item"><span class="sw" style="background:#6366f1"></span>Rendez-vous</span>
        <span class="legend-item"><span class="sw" style="background:#dc2626"></span>Deadline</span>
        <span class="legend-item"><span class="sw" style="background:#0891b2"></span>Call (Cal.com)</span>
        <span class="legend-item"><span class="sw" style="background:#d97706"></span>Tâche</span>
      </div>
    </div>`;

  document.getElementById("prev-month").addEventListener("click", () => { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } buildGrid(); });
  document.getElementById("next-month").addEventListener("click", () => { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } buildGrid(); });
  document.getElementById("today-btn").addEventListener("click", () => { viewYear = TODAY.getFullYear(); viewMonth = TODAY.getMonth(); buildGrid(); });
  document.getElementById("add-btn").addEventListener("click", openNewEventModal);
  document.getElementById("cal-sync-btn").addEventListener("click", () => syncCalcom(false));
  document.getElementById("cal-grid").addEventListener("click", e => {
    const evEl = e.target.closest(".cal-event");
    if (!evEl) return;
    if (evEl.dataset.id) openEventModal(evEl.dataset.id);
    else if (evEl.dataset.task) openEditTaskModal(evEl.dataset.task);
  });
  buildGrid();
}

/* =============================================================
   PAGE — COMPTABILITÉ (100% calculée depuis factures + clients)
   ============================================================= */
function renderComptabilite() {
  const main = document.getElementById("main");
  const c = computeCompta();
  const parClient = caParClient();
  const maxClient = Math.max(...parClient.map(x => x.total), 1);
  const totalClients = DB.clients.length;
  const payingClients = DB.clients.filter(cl => projectsOfClient(cl.id).some(p => (p.price || 0) > 0)).length;
  const convRate = totalClients ? Math.round((payingClients / totalClients) * 100) : 0;

  main.innerHTML =
    renderTopbar({
      title: "Comptabilité",
      subtitle: "CA compté dès la création du projet · charges saisies à la main",
    }) +
    `<div class="kpi-row kpi-row-4">
      <div class="stat-card">
        <div class="stat-top"><span class="stat-label">CA encaissé (${TODAY.getFullYear()})</span><span class="stat-icon">${ICONS.revenue}</span></div>
        <div><div class="stat-value">${fmtEur(c.totalPaid)}</div>
        <div class="stat-sub">sur <span class="pos">${c.nbProjets}</span> projet(s)</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-top"><span class="stat-label">Bénéfices nets</span><span class="stat-icon">${ICONS.profit}</span></div>
        <div><div class="stat-value">${fmtEur(c.profit)}</div>
        <div class="stat-sub">après ${fmtEur(c.chargesTotales)} de charges</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-top"><span class="stat-label">Charges prestataires</span><span class="stat-icon">${ICONS.clock}</span></div>
        <div><div class="stat-value">${fmtEur(c.chargesTotales)}</div>
        <div class="stat-sub">${DB.charges.length} charge(s) saisie(s) à la main</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-top"><span class="stat-label">Taux de conversion</span><span class="stat-icon">${ICONS.trend}</span></div>
        <div><div class="stat-value">${convRate}%</div>
        <div class="stat-sub"><span class="pos">${payingClients}</span> payant(s) sur ${totalClients} client(s)</div></div>
      </div>
    </div>

    <div class="grid-cols-1-2">
      <div class="card">
        <div class="card-head">
          <div><h3>Chiffre d'affaires</h3><div class="sub">CA par mois — compté dès la création du projet</div></div>
          <div class="chart-legend">
            <span class="li"><span class="sw" style="background:#5247fb"></span>Encaissé</span>
          </div>
        </div>
        <div class="card-pad"><div class="chart-box" id="compta-chart"></div></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="card">
          <div class="card-head"><div><h3>CA par client</h3><div class="sub">Tous les projets, encaissés direct</div></div></div>
          <div class="card-pad">
            <div class="bar-list">
              ${parClient.slice(0, 6).map(x => `
                <div class="bar-item">
                  <div class="bar-top"><span class="b-name">${esc(x.client.name)}</span><span class="b-val">${fmtEur(x.total)}</span></div>
                  <div class="bar-track"><div class="bar-fill lime" style="width:${(x.paid / maxClient * 100).toFixed(1)}%"></div></div>
                </div>`).join("") || '<div class="cell-muted" style="font-size:12px">Aucun projet avec montant pour l&#39;instant.</div>'}
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-head">
            <div><h3>Charges prestataires</h3><div class="sub">Saisies à la main — dev, outils…</div></div>
            <button class="btn btn-sm" id="add-charge-btn">${ICONS.plus}Ajouter</button>
          </div>
          <div class="card-pad" id="charges-list" style="padding-top:12px;">
            ${DB.charges.length ? DB.charges.slice().sort((a, b) => parseDate(b.date) - parseDate(a.date)).map(ch => `
              <div class="info-line charge-line" data-id="${ch.id}">
                <span class="il-key">${esc(ch.name)}<span style="font-family:var(--font-mono);font-size:10px;color:var(--text-3);margin-left:8px">${fmtDateShort(ch.date)}</span></span>
                <span class="il-val" style="display:inline-flex;align-items:center;gap:8px;">
                  <span class="cell-mono">${fmtEur(ch.amount)}</span>
                  <button class="task-del charge-del" style="opacity:1" title="Supprimer">${ICONS.trash}</button>
                </span>
              </div>`).join("") : `<div class="cell-muted" style="font-size:12px">Aucune charge. Ajoute le coût de ton dev ici ou à la création d'un projet.</div>`}
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById("add-charge-btn").addEventListener("click", () => {
    openModal(`
      <div class="modal-head"><h3>Nouvelle charge</h3><button class="drawer-close" onclick="closeModal()">${ICONS.close}</button></div>
      <div class="field"><label>Libellé</label><input class="input" id="f-cname" placeholder="Dev freelance" value="Dev freelance"></div>
      <div class="field-row">
        <div class="field"><label>Montant (€)</label><input class="input" type="number" id="f-camount" placeholder="1200" min="0"></div>
        <div class="field"><label>Date</label><input class="input" type="date" id="f-cdate" value="${toISO(TODAY)}"></div>
      </div>
      <div class="form-error hidden" id="f-err">Mets un libellé et un montant.</div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        <button class="btn" id="f-csave">Ajouter la charge</button>
      </div>`);
    document.getElementById("f-csave").addEventListener("click", () => {
      const name = document.getElementById("f-cname").value.trim();
      const amount = parseFloat(document.getElementById("f-camount").value) || 0;
      if (!name || amount <= 0) { document.getElementById("f-err").classList.remove("hidden"); return; }
      DB.charges.push({ id: uid("ch"), name, amount, date: document.getElementById("f-cdate").value || toISO(TODAY) });
      saveDB(); closeModal(); toast("Charge ajoutée"); renderComptabilite();
    });
  });
  document.querySelectorAll(".charge-del").forEach(btn => btn.addEventListener("click", () => {
    const id = btn.closest(".charge-line").dataset.id;
    DB.charges = DB.charges.filter(ch => ch.id !== id);
    saveDB(); toast("Charge supprimée"); renderComptabilite();
  }));

  drawComptaChart();
  window.addEventListener("resize", drawComptaChart);
  function drawComptaChart() {
    if (currentKey !== "comptabilite") return;
    const cc = computeCompta();
    lineChart("#compta-chart", { labels: MONTHS_SHORT, series: [
      { data: cc.realizedSeries, color: "#5247fb" },
    ]});
  }
}

/* =============================================================
   INIT
   ============================================================= */
const PAGES = {
  overview: renderOverview, clients: renderClients, projets: renderProjets,
  taches: renderTaches, calendrier: renderCalendrier,
  comptabilite: renderComptabilite,
};

loadDB();

document.getElementById("logo-mark").innerHTML = `<img src="${LOGO_SRC}" alt="Mevry">`;

const userEl = document.getElementById("username");
const passEl = document.getElementById("password");
const errEl = document.getElementById("err");
function attemptLogin() {
  const s = loginAttempt(userEl.value, passEl.value);
  if (!s) { errEl.classList.remove("hidden"); return; }
  errEl.classList.add("hidden");
  session = s;
  mountApp();
}
document.getElementById("submit").addEventListener("click", attemptLogin);
passEl.addEventListener("keydown", e => { if (e.key === "Enter") attemptLogin(); });
userEl.addEventListener("keydown", e => { if (e.key === "Enter") passEl.focus(); });

const existing = getSession();
if (existing) { session = existing; mountApp(); }
</script>
